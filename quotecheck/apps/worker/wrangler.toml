name = "quotecheck-api"
main = "src/handler.ts"
compatibility_date = "2024-04-20"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "quotecheck"
database_id = "your_db_id"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "your_bucket_name"

[env.production.vars]
TURNSTILE_SECRET = "your_secret"
GEMINI_API_KEY = "optional"
JWT_SECRET = "your_jwt_secret"